# docker-compose.yml
services:
  nginx:
    image: nginx:alpine
    ports: ["443:443", "80:80"]
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf
#      - ../nginx/ssl:/etc/nginx/ssl   # SSL 证书（启用 HTTPS 时取消注释）
    depends_on: [knowledge, consultant]

  knowledge:
    build: ../../knowledge  # 自动构建 knowledge 镜像
    env_file: ../../knowledge/.env  # 运行时环境变量
    volumes:
      - ../../data/knowledge/chroma_kb:/app/chroma_kb  # ChromaDB 持久化
      - ../../data/knowledge/crawl:/app/data/crawl     # 爬虫输出目录

  consultant:
    build: ../../consultant  # 自动构建 consultant 镜像
    env_file: ../../consultant/.env  # 运行时环境变量
    volumes:
      - ../../data/consultant/log:/app/log          # 日志持久化
      - ../../data/consultant/history:/app/history  # 对话历史持久化
    depends_on: [mysql, redis]

  mysql:
    image: mysql:9
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}  # 从服务器 .env 读取，禁止硬编码
      MYSQL_DATABASE: smart_nexus
    volumes:
      - ../../data/mysql:/var/lib/mysql
      - ../db/smart_nexus.sql:/docker-entrypoint-initdb.d/smart_nexus.sql  # 首次启动自动初始化

  redis:
    image: redis:7-alpine
    volumes:
      - ../../data/redis:/data